name: Claude PR assistant

# ─── One-time setup (required before this workflow will function) ─────────────
# 1. Install the Claude GitHub App on this repo:
#    https://github.com/apps/claude
#    (or run `claude /install-github-app` in the Claude Code CLI)
# 2. Add ANTHROPIC_API_KEY as a repository secret:
#    Settings → Secrets and variables → Actions → New repository secret
# ─────────────────────────────────────────────────────────────────────────────

# ─── Triggers ────────────────────────────────────────────────────────────────
# @claude mentions in issue/PR comments        → conversational Q&A / task help
# @claude mentions in PR review comments       → targeted code discussion
# PR opened or new commits pushed              → automatic review on each push
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]

# Required so the action can post comments and approve/request-changes on PRs.
permissions:
  contents: read
  pull-requests: write
  issues: write

# One concurrent run per PR/branch; cancel any stale run when a new commit
# is pushed so the review always reflects the latest code.
concurrency:
  group: claude-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  claude:
    name: Claude review / assistant
    runs-on: ubuntu-latest
    # Guard: ignore comments that are not @claude mentions (the action already
    # does this internally, but failing fast here keeps the billing log clean).
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Load repo context from file so prompts stay version-controlled and
      # editable without touching workflow YAML.
      - name: Load repo context
        id: ctx
        shell: bash
        run: |
          {
            echo 'instructions<<CLAUDE_INSTRUCTIONS_EOF'
            cat .github/instructions/repo-context.md
            echo CLAUDE_INSTRUCTIONS_EOF
          } >> "$GITHUB_OUTPUT"

      # For automatic PR reviews (pull_request event), load the review prompt
      # from file. For comment-triggered interactions, the comment text is the
      # prompt — no explicit prompt needed.
      - name: Load PR review prompt
        id: review_prompt
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          {
            echo 'text<<CLAUDE_PROMPT_EOF'
            cat .github/prompts/pr-review.md
            echo CLAUDE_PROMPT_EOF
          } >> "$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          custom_instructions: ${{ steps.ctx.outputs.instructions }}
          prompt: ${{ steps.review_prompt.outputs.text }}
