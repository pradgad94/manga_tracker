name: CI

on:
  push:
    branches: [master, main]
  pull_request:

# Cancel superseded runs on the same branch/PR so pushes don't queue up stale jobs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: ruff check
        run: ruff check .

      - name: mypy
        run: mypy app

  build-check:
    name: App builds and wires up
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: pip install -e .

      # Every `Settings` field has a default (see app/core/config.py), so
      # `create_app()` builds and wires up the full route table — DB engine,
      # cache client, MAL/Gemini-backed services, routers — without a live
      # Postgres/Redis or any API keys. This is a fast, secret-free smoke test
      # that the app's dependency graph is intact. There's no `tests/` suite
      # yet (pytest would just fail with "no tests collected"); add a real
      # `pytest` step here once one exists.
      - name: Verify the app builds and wires up
        run: |
          python -c "
          import app.main as m

          app = m.create_app()
          assert len(app.routes) > 0, 'create_app() produced no routes'
          print(f'OK — {len(app.routes)} routes registered')
          "
